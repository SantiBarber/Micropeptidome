cohort_prefix: "Visceral"
genome_fa: "/storage/scratch01/groups/md/microproteins/Microproteins_pipeline/Micropeptidome/Homo_sapiens.GRCh38.dna.primary_assembly.fa"
genome_gtf: "/storage/scratch01/groups/md/microproteins/Microproteins_pipeline/Micropeptidome/Homo_sapiens.GRCh38.115.gtf"

# Helper scripts
filter_smorf_pep_py: "scripts/filter_smorf_pep.py"
tx_to_genome_py: "scripts/smorfs_transcript_to_genome_gtf.py"
