aggregate_script: "scripts/aggregate_smorfs_by_locus.py"
make_smorf_rsem_ref_script: "scripts/make_smorf_rsem_ref_from_locus_summary.py"
add_rsem_tpms_script: "scripts/add_rsem_tpms_to_locus_summary.py"
blastp_append_script: "scripts/blastp_append_human_homology.py"

# Output directories
outdir: "/storage/scratch01/groups/md/microproteins/Microproteins_pipeline/Visceral"
star_index_dir: "/storage/scratch01/groups/md/microproteins/Microproteins_pipeline/Visceral/STAR_index"
merged_dir: "/storage/scratch01/groups/md/microproteins/Microproteins_pipeline/Visceral/merged_per_sample"
